version: '3.1'

services:

  test-db:
    container_name: test-db
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: test_sample
      MARIADB_USER: testuser
      MARIADB_PASSWORD: testpassword
      MARIADB_ROOT_HOST: '%'
    ports:
      - 3306:3306
    volumes:
      - test_mariadb_volume:/var/lib/mysql
    networks:
      - api-network

volumes:
  mariadb_volume:
  test_mariadb_volume:

networks:
  api-network:
    driver: bridge